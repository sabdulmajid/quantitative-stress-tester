services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  compute-engine:
    build:
      context: ./compute-engine
    environment:
      PORT: 8000
    ports:
      - "8000:8000"

  api-gateway:
    build:
      context: ./api-gateway
    environment:
      COMPUTE_ENGINE_URL: http://compute-engine:8000
      MARKET_DATA_BASE_URL: https://query1.finance.yahoo.com
      MARKET_DATA_RANGE: 3y
      MARKET_DATA_CACHE_TTL: 6h
      MARKET_DATA_FETCH_WORKERS: 2
      MARKET_DATA_FETCH_MIN_WAIT: 120ms
      MARKET_DATA_FETCH_MAX_WAIT: 320ms
      REDIS_URL: redis://redis:6379/0
      PORT: 8080
    depends_on:
      - redis
      - compute-engine
    ports:
      - "8080:8080"

  edge-ui:
    build:
      context: ./edge-ui
    environment:
      PORT: 3000
      API_GATEWAY_INTERNAL_URL: http://api-gateway:8080
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
    depends_on:
      - api-gateway
    ports:
      - "3000:3000"
